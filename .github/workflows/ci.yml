name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Build + unit tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build converter
        run: make converter

      - name: Vet
        run: make vet

      - name: gofmt
        run: make fmt

      - name: Unit tests
        run: make test

  e2e:
    name: End-to-end (cmake + bwrap)
    runs-on: ubuntu-22.04
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install pinned external tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake=3.28.* \
            ninja-build \
            bubblewrap
          cmake --version | head -1
          ninja --version
          bwrap --version 2>&1 | head -1

      - name: Build converter
        run: make converter

      - name: hello-world e2e
        run: make e2e-hello-world

      # libdrm e2e is gated on M1 milestone completion; enable when ready.
      # - name: libdrm e2e
      #   run: make e2e-libdrm
