name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Build + unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build converter
        run: make converter

      - name: Vet
        run: make vet

      - name: gofmt
        run: make fmt

      - name: Unit tests
        run: make test

  e2e:
    name: End-to-end (cmake + bwrap)
    runs-on: ubuntu-24.04
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install bwrap (cmake/ninja are pre-installed on ubuntu-24.04)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bubblewrap
          # Ubuntu 24.04 restricts unprivileged user namespaces by default
          # (kernel + AppArmor profile). Rather than fight the layers,
          # setuid bwrap so it creates the namespace as root. Acceptable for
          # CI; production REAPI workers don't go through this code path.
          sudo chmod u+s "$(command -v bwrap)"
          cmake --version | head -1
          ninja --version
          bwrap --version 2>&1 | head -1

      - name: Build converter
        run: make converter

      - name: hello-world e2e
        run: make e2e-hello-world

      - name: fmt e2e (M2 acceptance)
        run: make e2e-fmt

      - name: orchestrate e2e (M3a step 2)
        run: make e2e-orchestrate

      - name: cmake-consumer e2e (M5 step 11)
        run: make e2e-cmake-consumer

      - name: toolchain-skip e2e (configure-time win)
        run: make e2e-toolchain-skip

  bazel-e2e:
    name: End-to-end (bazel build downstream)
    runs-on: ubuntu-24.04
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install bwrap + bazelisk
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bubblewrap
          sudo chmod u+s "$(command -v bwrap)"
          curl -L --fail -o /tmp/bazelisk \
            https://github.com/bazelbuild/bazelisk/releases/download/v1.20.0/bazelisk-linux-amd64
          sudo install -m 0755 /tmp/bazelisk /usr/local/bin/bazelisk
          # bazelisk acts as bazel; symlink so the `bazel` LookPath in
          # bazelbuild_test.go resolves without extra shell config.
          sudo ln -sf /usr/local/bin/bazelisk /usr/local/bin/bazel
          bazel version | head -3 || true

      - name: Build converter + orchestrator
        run: make converter orchestrator

      - name: bazel-build downstream e2e (M5 step 10)
        run: make e2e-bazel-build

  buildbarn-e2e:
    name: End-to-end (real Buildbarn cache substrate)
    runs-on: ubuntu-24.04
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build orchestrator
        run: make orchestrator

      - name: Run M5 cache-share keystone against real bb-storage
        run: make e2e-buildbarn

      - name: Run M3b Execute keystone against real Buildbarn workers
        run: make e2e-buildbarn-execute
