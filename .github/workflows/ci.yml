name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]
  # Manual trigger — operator clicks "Run workflow" in the GitHub
  # UI to invoke a CI run with optional knobs. The fdsdk-probe job
  # reads workflow_dispatch.inputs.fdsdk_ref to pick which FDSDK
  # commit / branch / tag to probe; default master tracks upstream.
  workflow_dispatch:
    inputs:
      fdsdk_ref:
        description: "FDSDK ref to probe (branch / tag / commit). Empty skips the probe."
        required: false
        default: ""
        type: string

# Scope the auto-injected GITHUB_TOKEN. Default permissions on this
# repo are read-only for most resources; the post-failure-tail action
# needs to create PR comments, so explicitly grant `pull-requests:
# write`. `contents: read` is enough for checkout; nothing in this
# workflow writes to the repo content.
permissions:
  contents: read
  pull-requests: write

# Bash with pipefail so `make ... | tee /tmp/cijob.log` propagates make's
# non-zero exit (the post-failure-tail action reads /tmp/cijob.log to
# build its PR comment; without pipefail the tee succeeds and the step
# falsely reports green).
defaults:
  run:
    shell: bash

jobs:
  unit:
    name: Build + unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build converter
        run: make converter 2>&1 | tee -a /tmp/cijob.log

      - name: Vet
        run: make vet 2>&1 | tee -a /tmp/cijob.log

      - name: gofmt
        run: make fmt 2>&1 | tee -a /tmp/cijob.log

      - name: Unit tests
        run: make test 2>&1 | tee -a /tmp/cijob.log

      - name: Scale-fixture concurrency gate (no e2e tooling needed)
        run: make e2e-orchestrate-scale 2>&1 | tee -a /tmp/cijob.log

      - uses: ./.github/actions/post-failure-tail
        if: failure()

  cas-fuse-e2e:
    # Exercises internal/casfuse against a fake REAPI CAS server
    # (in-process), via a real FUSE mount. Runs the test suite's
    # fusermount-gated cases by installing fuse3 first; without
    # this job those tests skip silently on developer machines
    # too. Cheap (no docker, no bwrap, no bazel) so it sits next
    # to unit and gates the main e2e jobs.
    name: End-to-end (cas-fuse against fake CAS)
    runs-on: ubuntu-24.04
    needs: unit
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install fuse3
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fuse3
          fusermount3 --version || true

      - name: cas-fuse mount test (FUSE-gated cases)
        run: go test -v ./internal/casfuse/... -run TestMount 2>&1 | tee -a /tmp/cijob.log

      - uses: ./.github/actions/post-failure-tail
        if: failure()

  hello-fuse-e2e:
    # PR #60's verification target. Walks the full pipeline
    # source-push → cas-fuse → write-a --use-fuse-sources →
    # bazel build //elements/hello:hello_converted, asserting
    # the genrule's $(SRCS) resolves through @src_<key>//:tree
    # whose backing bytes live in CAS and are served via the
    # FUSE mount (no source-tree materialisation on dev disk).
    name: End-to-end (hello-fuse pipeline)
    runs-on: ubuntu-24.04
    needs: unit
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install fuse3 + getfattr + bwrap + pinned cmake + bazelisk
        # Same toolchain stack the existing bazel-e2e job uses,
        # plus fuse3/attr for the FUSE mount + xattr probe. The
        # SUID on bwrap is the same workaround the e2e job uses
        # for Ubuntu 24.04's userns restriction.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fuse3 attr bubblewrap
          sudo chmod u+s "$(command -v bwrap)"
          sudo env PREFIX=/usr/local tools/install-pinned-cmake.sh
          cmake --version | head -1
          curl -L --fail -o /tmp/bazelisk \
            https://github.com/bazelbuild/bazelisk/releases/download/v1.20.0/bazelisk-linux-amd64
          sudo install -m 0755 /tmp/bazelisk /usr/local/bin/bazelisk
          sudo ln -sf /usr/local/bin/bazelisk /usr/local/bin/bazel
          bazel version | head -3 || true

      - name: Build custom bb-runner image
        run: docker compose -f deploy/buildbarn/docker-compose.yml build bb-runner-bare 2>&1 | tee -a /tmp/cijob.log

      - name: e2e-hello-fuse (structural + bazel build)
        env:
          # Flips the bazel-build leg of tools/e2e-hello-fuse.sh
          # from skip to run. Without this the script only exercises
          # the structural assertions (generated files / mount /
          # xattr); with it, bazel build of the converter genrule
          # runs end-to-end.
          RUN_BAZEL: "1"
        run: make e2e-hello-fuse 2>&1 | tee -a /tmp/cijob.log

      - uses: ./.github/actions/post-failure-tail
        if: failure()

  e2e:
    name: End-to-end (cmake + bwrap)
    runs-on: ubuntu-24.04
    needs: unit
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install bwrap + pinned cmake (ninja is pre-installed)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bubblewrap
          # Ubuntu 24.04 restricts unprivileged user namespaces by default
          # (kernel + AppArmor profile). Rather than fight the layers,
          # setuid bwrap so it creates the namespace as root. Acceptable for
          # CI; production REAPI workers don't go through this code path.
          sudo chmod u+s "$(command -v bwrap)"
          # Install the cmake version this repo pins (Makefile's
          # CMAKE_VERSION) to /usr/local — the runner ships 3.31.6 in
          # /usr/bin, but the orchestrator's defaultPlatform asserts
          # 3.28.3 and the worker image installs that same pin. Using
          # the runner's cmake meant converter behavior on cmake 3.31+
          # only fired in CI, never local dev.
          sudo env PREFIX=/usr/local tools/install-pinned-cmake.sh
          cmake --version | head -1
          ninja --version
          bwrap --version 2>&1 | head -1

      - name: Build converter
        run: make converter 2>&1 | tee -a /tmp/cijob.log

      - name: hello-world e2e
        run: make e2e-hello-world 2>&1 | tee -a /tmp/cijob.log

      - name: fmt e2e (M2 acceptance)
        run: make e2e-fmt 2>&1 | tee -a /tmp/cijob.log

      - name: orchestrate e2e (M3a step 2)
        run: make e2e-orchestrate 2>&1 | tee -a /tmp/cijob.log

      - name: cmake-consumer e2e (M5 step 11)
        run: make e2e-cmake-consumer 2>&1 | tee -a /tmp/cijob.log

      - name: toolchain-skip e2e (configure-time win)
        run: make e2e-toolchain-skip 2>&1 | tee -a /tmp/cijob.log

      - uses: ./.github/actions/post-failure-tail
        if: failure()

  bazel-e2e:
    name: End-to-end (bazel build downstream)
    runs-on: ubuntu-24.04
    needs: unit
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install bwrap + pinned cmake + bazelisk
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bubblewrap
          sudo chmod u+s "$(command -v bwrap)"
          # Same pinned-cmake reasoning as the cmake-e2e job: don't
          # let the runner's stock cmake (3.31.6) shadow the version
          # the orchestrator's defaultPlatform asserts.
          sudo env PREFIX=/usr/local tools/install-pinned-cmake.sh
          cmake --version | head -1
          curl -L --fail -o /tmp/bazelisk \
            https://github.com/bazelbuild/bazelisk/releases/download/v1.20.0/bazelisk-linux-amd64
          sudo install -m 0755 /tmp/bazelisk /usr/local/bin/bazelisk
          # bazelisk acts as bazel; symlink so the `bazel` LookPath in
          # bazelbuild_test.go resolves without extra shell config.
          sudo ln -sf /usr/local/bin/bazelisk /usr/local/bin/bazel
          bazel version | head -3 || true

      - name: Build converter + orchestrator
        run: make converter orchestrator 2>&1 | tee -a /tmp/cijob.log

      - name: bazel-build downstream e2e (M5 step 10)
        run: make e2e-bazel-build 2>&1 | tee -a /tmp/cijob.log

      - name: fidelity e2e — hello-world (smoke fixture)
        run: make e2e-fidelity 2>&1 | tee -a /tmp/cijob.log

      - name: Fetch fmt (real-world fidelity fixture)
        run: make fetch-fmt 2>&1 | tee -a /tmp/cijob.log

      - name: fidelity e2e — fmt (real-world fixture)
        # fmt fidelity is iterative: each delta surfaced lands in
        # docs/fidelity-known-deltas.md before this gate goes green.
        # Until then, allow the step to fail without aborting the
        # job (continue-on-error) so reviewers see the diff output
        # in the log without losing the rest of the pipeline.
        continue-on-error: true
        run: make e2e-fidelity-fmt 2>&1 | tee -a /tmp/cijob.log

      - uses: ./.github/actions/post-failure-tail
        if: failure()

  buildbarn-e2e:
    name: End-to-end (real Buildbarn cache substrate)
    runs-on: ubuntu-24.04
    needs: unit
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build converter + orchestrator
        # The real-converter Buildbarn execute test
        # (TestE2E_Buildbarn_ExecuteRealConvertElement) uploads
        # build/bin/convert-element into CAS as the Action's binary,
        # so the converter binary must exist before the test runs.
        run: make converter orchestrator 2>&1 | tee -a /tmp/cijob.log

      - name: Build custom bb-runner image (cmake/ninja/bwrap layered on bb-runner-bare)
        # Building the worker image as an explicit step surfaces
        # Dockerfile / apt-repo issues independently of the test run
        # below. docker compose up would build it implicitly anyway,
        # but the failure mode there is opaque.
        run: docker compose -f deploy/buildbarn/docker-compose.yml build bb-runner-bare 2>&1 | tee -a /tmp/cijob.log

      - name: Run M5 cache-share keystone against real bb-storage
        run: make e2e-buildbarn 2>&1 | tee -a /tmp/cijob.log

      - name: Run M3b Execute keystone against real Buildbarn workers
        run: make e2e-buildbarn-execute 2>&1 | tee -a /tmp/cijob.log

      - name: Run source-push roundtrip against real bb-storage (PR #59)
        # Pack a synthetic source tree, push every blob into CAS via
        # cmd/source-push's wire format, then read it back through
        # casfuse.Tree. Verifies BatchUpdateBlobs / BatchReadBlobs
        # / ByteStream.Read interop with bb-storage end-to-end.
        run: make e2e-source-push 2>&1 | tee -a /tmp/cijob.log

      - uses: ./.github/actions/post-failure-tail
        if: failure()

  fdsdk-probe:
    # Empirical FDSDK reality-check probe: clone FDSDK at the
    # requested ref, run scripts/fdsdk-reality-check.sh, upload
    # the per-element status report as an artifact. Triggered
    # only via workflow_dispatch with a non-empty fdsdk_ref input
    # — every push / PR skips it (FDSDK clone is ~150MB and the
    # probe takes minutes; not worth gating every CI run).
    name: FDSDK reality-check probe
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' && inputs.fdsdk_ref != ''
    needs: unit
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Clone FDSDK at ${{ inputs.fdsdk_ref }}
        run: |
          git clone --depth=1 --branch="${{ inputs.fdsdk_ref }}" \
              https://gitlab.com/freedesktop-sdk/freedesktop-sdk.git \
              /tmp/fdsdk

      - name: Run probe
        run: |
          FDSDK_DIR=/tmp/fdsdk scripts/fdsdk-reality-check.sh 2>&1 \
              | tee /tmp/probe-report.txt

      - name: Upload probe report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fdsdk-probe-report-${{ github.run_id }}
          path: /tmp/probe-report.txt
          if-no-files-found: warn

      - uses: ./.github/actions/post-failure-tail
        if: failure()
