name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Build + unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build converter
        run: make converter

      - name: Vet
        run: make vet

      - name: gofmt
        run: make fmt

      - name: Unit tests
        run: make test

  e2e:
    name: End-to-end (cmake + bwrap)
    runs-on: ubuntu-24.04
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install bwrap (cmake/ninja are pre-installed on ubuntu-24.04)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bubblewrap
          # Ubuntu 24.04 ships an AppArmor profile that restricts unprivileged
          # user namespaces by default; bwrap needs them to set up uid maps.
          # Disable the restriction at the kernel level for the runner.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          cmake --version | head -1
          ninja --version
          bwrap --version 2>&1 | head -1

      - name: Build converter
        run: make converter

      - name: hello-world e2e
        run: make e2e-hello-world

      # libdrm e2e is gated on M1 milestone completion; enable when ready.
      # - name: libdrm e2e
      #   run: make e2e-libdrm
