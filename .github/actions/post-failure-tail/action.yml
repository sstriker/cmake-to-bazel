name: Post job failure tail to PR
description: >
  On step failure within a CI job, read /tmp/cijob.log (which the
  failure-prone steps tee'd to) and post the last ~150 lines as a PR
  comment on every pull request associated with the head commit.
  The runner-injected GITHUB_TOKEN is sufficient — no PAT required —
  but the workflow must declare `permissions: pull-requests: write`.

  Why a tee'd file instead of fetching the job log via API: the
  GitHub REST endpoint that returns job logs only serves them after
  the job completes, but `if: failure()` post steps run BEFORE the
  job completes (they're a same-job step, not a separate job). The
  tee'd file is available the moment the failing step exits.

  Usage (must run with `if: failure()`):

      - uses: ./.github/actions/post-failure-tail
        if: failure()

  Skips silently when /tmp/cijob.log doesn't exist (e.g. the failing
  step never ran make and produced no logged output) or when the
  head commit isn't associated with a PR.

runs:
  using: composite
  steps:
    - uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const LOG = '/tmp/cijob.log';
          let log = '';
          try {
            log = fs.readFileSync(LOG, 'utf8');
          } catch (err) {
            core.notice(`post-failure-tail: ${LOG} not present (${err.code}); skipping`);
            return;
          }
          if (!log.trim()) {
            core.notice('post-failure-tail: /tmp/cijob.log is empty; skipping');
            return;
          }
          const lines = log.split('\n');
          const TAIL = 150;
          const tail = lines.slice(-TAIL).join('\n');
          const truncated = lines.length > TAIL
            ? `_(showing last ${TAIL} of ${lines.length} lines)_\n\n`
            : '';

          // Determine which PRs to comment on. In pull_request-triggered
          // runs, context.sha is the merge ref and the
          // listPullRequestsAssociatedWithCommit endpoint returns
          // empty, so prefer the trigger payload's PR number when
          // present. Fall back to commit-association lookup for push-
          // triggered runs.
          let prNumbers = [];
          if (context.payload.pull_request) {
            prNumbers.push(context.payload.pull_request.number);
          } else {
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              ...context.repo, commit_sha: context.sha,
            });
            prNumbers = prs.data.map(pr => pr.number);
          }
          if (prNumbers.length === 0) {
            core.notice(`post-failure-tail: no PR for commit ${context.sha}; skipping comment`);
            return;
          }
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const body = [
            `## CI failure: \`${context.workflow} / ${context.job}\``,
            ``,
            `[full log](${runUrl}) · commit \`${context.sha.slice(0, 7)}\``,
            ``,
            truncated + '```',
            tail,
            '```',
          ].join('\n');
          for (const num of prNumbers) {
            try {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: num, body,
              });
              core.notice(`post-failure-tail: posted to PR #${num}`);
            } catch (err) {
              core.warning(`post-failure-tail: comment-create failed for PR #${num}: ${err.message || err}`);
            }
          }
