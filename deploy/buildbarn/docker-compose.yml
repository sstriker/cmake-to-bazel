# Buildbarn deployment for M5 cache-substrate + M3b execution
# validation.
#
# Brings up:
#   - bb-storage    CAS + AC frontend (validates M5)
#   - bb-scheduler  queues Actions for execution (validates M3b)
#   - bb-worker     pulls actions, materializes input roots
#   - bb-runner-bare  exec's commands on behalf of bb-worker
#
# This is NOT a production deployment — single replica, no auth, in-
# container blobstore, bare runner without sandboxing. Use it to
# validate end-to-end protocol round trips before pointing the
# orchestrator at a production endpoint.
#
# Bring up:    docker compose -f deploy/buildbarn/docker-compose.yml up -d
# Tear down:   docker compose -f deploy/buildbarn/docker-compose.yml down -v
# Logs:        docker compose -f deploy/buildbarn/docker-compose.yml logs -f
#
# Image tags are pinned (rather than :latest) so config schema drift
# doesn't surprise CI; bumping requires re-validating the .jsonnet
# files against the new schema.

services:
  bb-storage:
    image: ghcr.io/buildbarn/bb-storage:20251008T080857Z-b207a91
    container_name: bb-storage
    restart: unless-stopped
    command: ["/config/storage.jsonnet"]
    volumes:
      - ./config:/config:ro
      - bb-storage-data:/storage
    ports:
      - "127.0.0.1:8980:8980"  # REAPI gRPC (Action Cache + CAS + ByteStream)
      - "127.0.0.1:9980:9980"  # diagnostics http
    # No in-container healthcheck: bb-storage is a distroless image
    # with only the bb_storage binary — no shell, no wget, no curl —
    # so any CMD-form healthcheck would always fail and compose's
    # depends_on: condition: service_healthy would abort the whole
    # bring-up. Readiness is gated externally by `make buildbarn-up`'s
    # curl loop against http://127.0.0.1:9980/-/healthy.

  bb-scheduler:
    image: ghcr.io/buildbarn/bb-scheduler:20251031T081715Z-4415657
    container_name: bb-scheduler
    restart: unless-stopped
    command: ["/config/scheduler.jsonnet"]
    volumes:
      - ./config:/config:ro
    ports:
      - "127.0.0.1:8983:8983"  # REAPI Execution gRPC (orchestrator submits here)
      - "127.0.0.1:9982:9982"  # diagnostics http
    depends_on:
      bb-storage:
        condition: service_started

  bb-runner-bare:
    # Custom image: upstream bb-runner-bare layered with cmake / ninja /
    # bwrap at the versions the orchestrator's defaultPlatform asserts.
    # See deploy/buildbarn/runner/Dockerfile.
    build:
      context: ./runner
      args:
        CMAKE_VERSION: 3.28.3
        NINJA_VERSION: 1.11.1
        BWRAP_VERSION: 0.8.0
    image: cmake-to-bazel/bb-runner:local
    container_name: bb-runner-bare
    restart: unless-stopped
    # Pre-create /worker/build and /worker/cache before bb_runner
    # starts. bb-worker hardlinks input files from cache_directory_path
    # to build_directory_path; both paths must be on the SAME
    # filesystem or the hardlink fails with EXDEV (invalid cross-device
    # link). Mounting them as a single /worker volume keeps them on
    # one filesystem, but the volume starts empty and bb-worker doesn't
    # mkdir its working dirs — runner-bare creates them here, having
    # /bin/sh available (debian:bookworm-slim base).
    entrypoint: ["sh", "-c"]
    command:
      - "mkdir -p /worker/build /worker/cache && exec /app/bb_runner /config/runner.jsonnet"
    volumes:
      - ./config:/config:ro
      # Shared /worker volume covers both buildDirectoryPath
      # (/worker/build) and cacheDirectoryPath (/worker/cache),
      # placing bb-worker's hardlink source + destination on the
      # same filesystem.
      - bb-worker:/worker
      # Dedicated socket volume, shared with bb-worker. Cannot live
      # inside /worker/build: bb_runner clears stale entries from
      # buildDirectoryPath at startup and would unlink its own
      # listening socket. /sock is a sibling mount with nothing else
      # in it, so the socket persists.
      - bb-runner-sock:/sock
    healthcheck:
      test: ["CMD", "test", "-S", "/sock/runner.sock"]
      interval: 1s
      timeout: 1s
      retries: 30
      start_period: 5s

  bb-worker:
    image: ghcr.io/buildbarn/bb-worker:20251031T081715Z-4415657
    container_name: bb-worker
    restart: unless-stopped
    command: ["/config/worker.jsonnet"]
    volumes:
      - ./config:/config:ro
      # Single /worker volume holds both build_directory_path and
      # cache_directory_path; bb-worker hardlinks between them and
      # needs them on the same filesystem.
      - bb-worker:/worker
      - bb-runner-sock:/sock
    ports:
      - "127.0.0.1:9981:9981"  # diagnostics http (used by make buildbarn-up readiness)
    depends_on:
      bb-storage:
        condition: service_started
      bb-scheduler:
        condition: service_started
      # bb-worker dials bb-runner-bare's unix socket on startup
      # (worker.jsonnet's runners[].endpoint = unix:///worker/build/runner.sock).
      # If runner hasn't bound the socket yet, the worker logs
      # "Worker failed readiness check: dial unix .../runner.sock: connect:
      # no such file or directory" and never registers with the scheduler;
      # TestE2E_Buildbarn_Execute then fails with "No workers exist for
      # platform ...". Waiting on runner's socket-bound healthcheck
      # closes the race deterministically.
      bb-runner-bare:
        condition: service_healthy

volumes:
  bb-storage-data:
  bb-worker:
  bb-runner-sock:
