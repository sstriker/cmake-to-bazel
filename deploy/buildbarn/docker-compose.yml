# Buildbarn deployment for M5 cache-substrate + M3b execution
# validation.
#
# Brings up:
#   - bb-storage    CAS + AC frontend (validates M5)
#   - bb-scheduler  queues Actions for execution (validates M3b)
#   - bb-worker     pulls actions, materializes input roots
#   - bb-runner-bare  exec's commands on behalf of bb-worker
#
# This is NOT a production deployment — single replica, no auth, in-
# container blobstore, bare runner without sandboxing. Use it to
# validate end-to-end protocol round trips before pointing the
# orchestrator at a production endpoint.
#
# Bring up:    docker compose -f deploy/buildbarn/docker-compose.yml up -d
# Tear down:   docker compose -f deploy/buildbarn/docker-compose.yml down -v
# Logs:        docker compose -f deploy/buildbarn/docker-compose.yml logs -f
#
# Image tags are pinned (rather than :latest) so config schema drift
# doesn't surprise CI; bumping requires re-validating the .jsonnet
# files against the new schema.

services:
  bb-storage:
    image: ghcr.io/buildbarn/bb-storage:20251008T080857Z-b207a91
    container_name: bb-storage
    restart: unless-stopped
    command: ["/config/storage.jsonnet"]
    volumes:
      - ./config:/config:ro
      - bb-storage-data:/storage
    ports:
      - "127.0.0.1:8980:8980"  # REAPI gRPC (Action Cache + CAS + ByteStream)
      - "127.0.0.1:9980:9980"  # diagnostics http
    # No in-container healthcheck: bb-storage is a distroless image
    # with only the bb_storage binary — no shell, no wget, no curl —
    # so any CMD-form healthcheck would always fail and compose's
    # depends_on: condition: service_healthy would abort the whole
    # bring-up. Readiness is gated externally by `make buildbarn-up`'s
    # curl loop against http://127.0.0.1:9980/-/healthy.

  bb-scheduler:
    image: ghcr.io/buildbarn/bb-scheduler:20251031T081715Z-4415657
    container_name: bb-scheduler
    restart: unless-stopped
    command: ["/config/scheduler.jsonnet"]
    volumes:
      - ./config:/config:ro
    ports:
      - "127.0.0.1:8983:8983"  # REAPI Execution gRPC (orchestrator submits here)
      - "127.0.0.1:9982:9982"  # diagnostics http
    depends_on:
      bb-storage:
        condition: service_started

  bb-worker:
    image: ghcr.io/buildbarn/bb-worker:20251031T081715Z-4415657
    container_name: bb-worker
    restart: unless-stopped
    command: ["/config/worker.jsonnet"]
    volumes:
      - ./config:/config:ro
      - bb-worker-build:/worker/build
      - bb-worker-cache:/worker/cache
    depends_on:
      bb-storage:
        condition: service_started
      bb-scheduler:
        condition: service_started

  bb-runner-bare:
    # Custom image: upstream bb-runner-bare layered with cmake / ninja /
    # bwrap at the versions the orchestrator's defaultPlatform asserts.
    # See deploy/buildbarn/runner/Dockerfile.
    build:
      context: ./runner
      args:
        CMAKE_VERSION: 3.28.3
        NINJA_VERSION: 1.11.1
        BWRAP_VERSION: 0.8.0
    image: cmake-to-bazel/bb-runner:local
    container_name: bb-runner-bare
    restart: unless-stopped
    command: ["/config/runner.jsonnet"]
    volumes:
      - ./config:/config:ro
      - bb-worker-build:/worker/build
    depends_on:
      bb-worker:
        condition: service_started

volumes:
  bb-storage-data:
  bb-worker-build:
  bb-worker-cache:
