# Project-level variable overrides for the manual-greet fixture.
# Mirrors FDSDK's project.conf shape — prefix=/usr is the canonical
# meta-project override of BuildStream stock /usr/local. With this
# file in place, every derived path (%{datadir}, %{libdir}, ...)
# rebases off /usr automatically via the BuildStream-stock
# derivation chain (see cmd/write-a/variables.go's projectVars).
variables:
  prefix: /usr
