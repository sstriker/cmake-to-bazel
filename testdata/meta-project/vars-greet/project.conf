# Project-level variable overrides for the vars-greet fixture.
# Sets prefix=/usr at the project layer; the .bst's variables: block
# overrides it AGAIN at the element layer (to /opt/freedesktop-sdk),
# exercising the precedence chain end-to-end:
#
#   BuildStream stock (/usr/local)
#     < project.conf (/usr)            ← here
#       < element variables: (/opt/freedesktop-sdk)
#
# Element layer wins; the rendered cmd lands files under
# /opt/freedesktop-sdk regardless of this override.
variables:
  prefix: /usr
